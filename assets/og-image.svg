<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#0284c7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Logo symbol (sluice gate / database flow icon) -->
  <g transform="translate(80, 175)">
    <rect width="100" height="100" rx="20" fill="url(#logoGradient)"/>
    <g transform="translate(50, 50)" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Database cylinder top -->
      <ellipse cx="0" cy="-18" rx="18" ry="7" />
      <!-- Database body -->
      <path d="M -18,-18 L -18,8 C -18,12 -10,15 0,15 C 10,15 18,12 18,8 L 18,-18" />
      <!-- Flow arrow coming out bottom -->
      <path d="M 0,15 L 0,28" stroke-width="3" />
      <path d="M -6,22 L 0,28 L 6,22" stroke-width="3" />
    </g>
  </g>

  <!-- Main heading -->
  <text x="210" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="white" letter-spacing="-1">
    sluice
  </text>

  <!-- Subtitle (below logo + heading, spans left column) -->
  <text x="80" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0">
    Batched PostgreSQL backfills, safely.
  </text>

  <!-- Feature highlights -->
  <g transform="translate(80, 365)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="155" height="40" rx="20" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="77" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#38bdf8" text-anchor="middle">
      Batch + Resume
    </text>

    <!-- Badge 2 -->
    <rect x="170" y="0" width="155" height="40" rx="20" fill="#1e293b" stroke="#0284c7" stroke-width="1.5"/>
    <text x="247" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#0284c7" text-anchor="middle">
      Cycle Detection
    </text>

    <!-- Badge 3 -->
    <rect x="340" y="0" width="155" height="40" rx="20" fill="#1e293b" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="417" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#7dd3fc" text-anchor="middle">
      Interleaving
    </text>

    <!-- Badge 4 -->
    <rect x="0" y="55" width="155" height="40" rx="20" fill="#1e293b" stroke="#bae6fd" stroke-width="1.5"/>
    <text x="77" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#bae6fd" text-anchor="middle">
      Renumber
    </text>

    <!-- Badge 5 -->
    <rect x="170" y="55" width="155" height="40" rx="20" fill="#1e293b" stroke="#e0f2fe" stroke-width="1.5"/>
    <text x="247" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#e0f2fe" text-anchor="middle">
      Branch Switch
    </text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(660, 175)">
    <rect width="460" height="250" rx="12" fill="#0f1117" stroke="#2d3748" stroke-width="2"/>

    <!-- Code header -->
    <rect width="460" height="40" rx="12" fill="#1e293b"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Code content -->
    <text x="20" y="80" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#38bdf8" font-weight="500">$ sluice run</text>
    <text x="20" y="110" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Step [1/3] migrations to 5</text>
    <text x="20" y="135" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Backfill 1: 25000 rows</text>
    <text x="20" y="160" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#10b981">✓ Interleaved run complete</text>

    <text x="20" y="200" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#38bdf8" font-weight="500">$ sluice renumber main</text>
    <text x="20" y="230" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#10b981">✓ Renumbered 1 migration(s)</text>
  </g>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accentGradient)"/>
</svg>
